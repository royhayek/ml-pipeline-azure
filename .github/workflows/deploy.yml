name: CD - Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, prod]

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: mlapi
  RESOURCE_GROUP_STAGING: rg-mlpipeline-staging
  RESOURCE_GROUP_PROD: rg-mlpipeline-prod

jobs:
  # --- Always runs: verifies the Docker image can be built from source ----
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_size: ${{ steps.meta.outputs.image_size }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t mlapi:${{ steps.meta.outputs.image_tag }} \
            -t mlapi:latest \
            -f api/Dockerfile \
            .

      - name: Report image size
        id: size
        run: |
          SIZE=$(docker image inspect mlapi:latest --format='{{.Size}}' | numfmt --to=iec)
          echo "image_size=$SIZE" >> $GITHUB_OUTPUT
          echo "Built Docker image: mlapi:${{ steps.meta.outputs.image_tag }} (~$SIZE)"

  # --- Real deploy: only runs when DEPLOY_ENABLED repo variable is "true" ---
  # Set this in Settings -> Secrets and variables -> Actions -> Variables
  # after configuring the AZURE_* secrets and ACR_* secrets at repo level.
  push-to-acr:
    name: Push image to ACR
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build, tag, and push
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            -f api/Dockerfile \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  deploy-staging:
    name: Deploy to staging
    needs: push-to-acr
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App (staging)
        run: |
          az containerapp update \
            --name ca-mlapi-staging \
            --resource-group ${{ env.RESOURCE_GROUP_STAGING }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

      - name: Deploy Functions (staging)
        run: |
          cd functions
          pip install azure-functions-core-tools --pre -q
          func azure functionapp publish func-dispatcher-staging --python
          func azure functionapp publish func-worker-staging --python

      - name: Smoke test staging
        run: |
          STAGING_URL=$(az containerapp show \
            --name ca-mlapi-staging \
            --resource-group ${{ env.RESOURCE_GROUP_STAGING }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          curl -sf "https://${STAGING_URL}/health" | grep '"status":"ok"'

  deploy-prod:
    name: Deploy to production
    needs: [push-to-acr, deploy-staging]
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    environment: prod   # requires manual approval gate configured in GitHub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App (prod)
        run: |
          az containerapp update \
            --name ca-mlapi-prod \
            --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

      - name: Deploy Functions (prod)
        run: |
          cd functions
          pip install azure-functions-core-tools --pre -q
          func azure functionapp publish func-dispatcher-prod --python
          func azure functionapp publish func-worker-prod --python

      - name: Smoke test production
        run: |
          PROD_URL=$(az containerapp show \
            --name ca-mlapi-prod \
            --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          curl -sf "https://${PROD_URL}/health" | grep '"status":"ok"'
