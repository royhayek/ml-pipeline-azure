name: CI — Test & Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  test-and-lint:
    name: Python tests + lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            api/requirements.txt
            model/requirements.txt

      - name: Install API dependencies
        run: pip install -r api/requirements.txt

      - name: Install model dependencies
        run: pip install -r model/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 api/ functions/ model/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,*.egg-info

      - name: Run API unit tests
        env:
          MODEL_PATH: ${{ github.workspace }}/model/model_v1.0.0.pkl
          MODEL_VERSION: "1.0.0"
          API_VERSION: "1.0.0"
        run: |
          python -m pytest api/tests/ -v --tb=short

      - name: Build Docker image (smoke test)
        run: |
          docker build \
            --build-arg MODEL_PATH=model/model_v1.0.0.pkl \
            -t mlapi:ci-test \
            -f api/Dockerfile \
            .

  build-frontend:
    name: Build React dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
