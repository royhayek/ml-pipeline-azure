<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ML Pipeline — Inference Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg:           #080812;
      --bg-surface:   #0d0e1c;
      --bg-card:      rgba(255,255,255,0.025);
      --border:       rgba(255,255,255,0.07);
      --border-hover: rgba(124,255,212,0.25);
      --text:         #a8b0cc;
      --text-dim:     #363c56;
      --text-bright:  #e8eaf6;
      --mint:         #7cffd4;
      --mint-dim:     rgba(124,255,212,0.1);
      --amber:        #ffcc5c;
      --amber-dim:    rgba(255,204,92,0.1);
      --red:          #ff6b8a;
      --font-display: 'Syne', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      /* subtle dot-grid background */
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 28px 28px;
      background-attachment: fixed;
    }

    /* Vignette overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(8,8,18,0.7) 100%);
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      background: rgba(8,8,18,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .header-brand {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
    }

    .brand-name {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.04em;
      color: var(--text-bright);
      text-transform: uppercase;
    }

    .brand-slash { color: var(--mint); font-weight: 300; }

    .brand-sub {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header-right { display: flex; align-items: center; gap: 1.5rem; }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.65rem;
      border: 1px solid rgba(124,255,212,0.2);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mint);
    }

    .live-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 6px var(--mint);
      animation: blink 2.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.25; }
    }

    .sync-time {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .main { padding: 2.5rem; max-width: 1440px; margin: 0 auto; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 1.25rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ── Stat cards ──────────────────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 1px solid var(--border);
      margin-bottom: 2.5rem;
      overflow: hidden;
    }

    .stat-card {
      padding: 1.75rem 1.5rem 1.5rem;
      background: var(--bg-card);
      position: relative;
      cursor: default;
      transition: background 0.25s;
      border-right: 1px solid var(--border);
    }
    .stat-card:last-child { border-right: none; }

    .stat-card:hover { background: rgba(124,255,212,0.03); }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--mint), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .stat-card:hover::before { opacity: 0.6; }

    .stat-idx {
      font-size: 0.55rem;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      margin-bottom: 1rem;
    }

    .stat-value {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 2.75rem;
      line-height: 1;
      color: var(--text-bright);
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
    }

    .stat-value.c-mint  { color: var(--mint); }
    .stat-value.c-amber { color: var(--amber); }

    .stat-unit {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-dim);
      margin-left: 0.2rem;
    }

    .stat-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Charts ──────────────────────────────────────────────────────────── */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 1.5rem;
      transition: border-color 0.25s;
    }
    .chart-card:hover { border-color: var(--border-hover); }

    .chart-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }

    .chart-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-bright);
      letter-spacing: 0.02em;
      margin-bottom: 0.2rem;
    }

    .chart-desc {
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .chart-badge {
      font-size: 0.6rem;
      padding: 0.2rem 0.55rem;
      border: 1px solid var(--border);
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .chart-wrap { position: relative; height: 200px; }

    /* ── Table ───────────────────────────────────────────────────────────── */
    .table-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: border-color 0.25s;
    }
    .table-card:hover { border-color: var(--border-hover); }

    .table-head-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .table-head-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-bright);
    }

    .table-head-meta {
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 0.3rem 0.8rem;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--mint); color: var(--mint); }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }

    thead th {
      padding: 0.7rem 1.5rem;
      text-align: left;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 400;
      font-family: var(--font-mono);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s;
      animation: rowFade 0.3s ease both;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.025); }

    @keyframes rowFade {
      from { opacity: 0; transform: translateX(-4px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    td {
      padding: 0.75rem 1.5rem;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    td.t-bright { color: var(--text-bright); font-weight: 500; }
    td.t-mint   { color: var(--mint); }
    td.t-amber  { color: var(--amber); }
    td.t-dim    { color: var(--text-dim); font-size: 0.68rem; }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 0.18rem 0.55rem;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      border: 1px solid;
    }
    .chip-mint  { border-color: rgba(124,255,212,0.25); color: var(--mint);  background: var(--mint-dim); }
    .chip-amber { border-color: rgba(255,204,92,0.25);  color: var(--amber); background: var(--amber-dim); }

    .blob-name {
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: block;
    }

    /* ── Empty / loading ─────────────────────────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 0.75rem;
      color: var(--text-dim);
    }
    .empty-icon { font-size: 1.5rem; opacity: 0.3; }
    .empty-text { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── Fade-up on load ─────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both; }
    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.12s; }
    .delay-3 { animation-delay: 0.19s; }
    .delay-4 { animation-delay: 0.26s; }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-card:nth-child(2) { border-right: none; }
      .stat-card:nth-child(3) { border-right: 1px solid var(--border); border-top: 1px solid var(--border); }
      .stat-card:nth-child(4) { border-right: none; border-top: 1px solid var(--border); }
    }

    @media (max-width: 768px) {
      .header { padding: 0 1.25rem; }
      .main { padding: 1.25rem; }
      .charts-row { grid-template-columns: 1fr; }
      .brand-sub { display: none; }
      .sync-time { display: none; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-value { font-size: 2rem; }
    }

    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .stat-card { border-right: none !important; border-top: 1px solid var(--border); }
      .stat-card:first-child { border-top: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    const API_URL       = '/api/recent';
    const POLL_INTERVAL = 30_000;

    // ── Global Chart.js defaults ────────────────────────────────────────────
    Chart.defaults.color        = '#363c56';
    Chart.defaults.borderColor  = 'rgba(255,255,255,0.05)';
    Chart.defaults.font.family  = "'JetBrains Mono', monospace";
    Chart.defaults.font.size    = 10;

    // ── Chart components ────────────────────────────────────────────────────
    function BarChart({ labels, values }) {
      const ref  = useRef(null);
      const inst = useRef(null);

      useEffect(() => {
        if (!ref.current) return;
        inst.current?.destroy();
        inst.current = new Chart(ref.current, {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              data: values,
              backgroundColor: 'rgba(124,255,212,0.12)',
              borderColor:     '#7cffd4',
              borderWidth: 1,
              borderRadius: 0,
              hoverBackgroundColor: 'rgba(124,255,212,0.22)',
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#0d0e1c',
                borderColor: 'rgba(124,255,212,0.3)',
                borderWidth: 1,
                padding: 10,
                callbacks: { label: ctx => `  ${ctx.parsed.y.toFixed(2)} °C` },
              },
            },
            scales: {
              x: {
                grid: { color: 'rgba(255,255,255,0.03)' },
                ticks: { color: '#363c56', maxRotation: 30, font: { size: 9 } },
              },
              y: {
                grid: { color: 'rgba(255,255,255,0.04)' },
                ticks: { color: '#363c56', callback: v => v.toFixed(1) + '°' },
              },
            },
          },
        });
        return () => inst.current?.destroy();
      }, [labels, values]);

      return <canvas ref={ref} />;
    }

    function LineChart({ labels, values }) {
      const ref  = useRef(null);
      const inst = useRef(null);

      useEffect(() => {
        if (!ref.current) return;
        inst.current?.destroy();
        inst.current = new Chart(ref.current, {
          type: 'line',
          data: {
            labels,
            datasets: [{
              data: values,
              borderColor:     '#ffcc5c',
              backgroundColor: (ctx) => {
                const canvas = ctx.chart.canvas;
                const gradient = canvas.getContext('2d').createLinearGradient(0, 0, 0, 200);
                gradient.addColorStop(0,   'rgba(255,204,92,0.18)');
                gradient.addColorStop(1,   'rgba(255,204,92,0)');
                return gradient;
              },
              borderWidth: 1.5,
              pointRadius: 3,
              pointBackgroundColor: '#ffcc5c',
              pointBorderColor:     '#080812',
              pointBorderWidth: 1.5,
              tension: 0.4,
              fill: true,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#0d0e1c',
                borderColor: 'rgba(255,204,92,0.3)',
                borderWidth: 1,
                padding: 10,
                callbacks: { label: ctx => `  ${ctx.parsed.y.toFixed(1)} ms` },
              },
            },
            scales: {
              x: {
                grid: { color: 'rgba(255,255,255,0.03)' },
                ticks: { color: '#363c56', maxRotation: 30, font: { size: 9 } },
              },
              y: {
                grid: { color: 'rgba(255,255,255,0.04)' },
                ticks: { color: '#363c56', callback: v => v + ' ms' },
              },
            },
          },
        });
        return () => inst.current?.destroy();
      }, [labels, values]);

      return <canvas ref={ref} />;
    }

    // ── Stat card ───────────────────────────────────────────────────────────
    function StatCard({ idx, value, unit, label, colorClass, delay }) {
      return (
        <div className={`stat-card fade-up ${delay}`}>
          <div className="stat-idx">0{idx}</div>
          <div className={`stat-value ${colorClass || ''}`}>
            {value}
            {unit && <span className="stat-unit">{unit}</span>}
          </div>
          <div className="stat-label">{label}</div>
        </div>
      );
    }

    // ── Spinner icon ────────────────────────────────────────────────────────
    function SpinIcon() {
      return (
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
          <path d="M21 12a9 9 0 11-6.219-8.56" />
        </svg>
      );
    }

    // ── Main App ────────────────────────────────────────────────────────────
    function App() {
      const [rows,      setRows]      = useState([]);
      const [lastSync,  setLastSync]  = useState(null);
      const [loading,   setLoading]   = useState(true);
      const [fetching,  setFetching]  = useState(false);
      const [error,     setError]     = useState(null);

      const load = useCallback(async () => {
        setFetching(true);
        try {
          const res = await fetch(API_URL);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const { data } = await res.json();
          setRows(data || []);
          setLastSync(new Date());
          setError(null);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
          setFetching(false);
        }
      }, []);

      useEffect(() => {
        load();
        const id = setInterval(load, POLL_INTERVAL);
        return () => clearInterval(id);
      }, [load]);

      // Derived
      const n = rows.length;
      const avgLatency = n
        ? (rows.reduce((s, r) => s + (r.latency_ms || 0), 0) / n).toFixed(1)
        : '—';
      const avgTemp = n
        ? (rows.reduce((s, r) => s + (r.confidence_score || 0), 0) / n).toFixed(2)
        : '—';
      const modelVer = rows[0]?.model_version ?? '—';

      // Charts: chronological order
      const ordered = [...rows].reverse();
      const chartLabels = ordered.map(r => {
        const s = r.blob_name.split('/').pop().replace('.csv', '');
        return s.length > 14 ? s.slice(0, 14) + '…' : s;
      });
      const tempVals    = ordered.map(r => +(r.confidence_score ?? 0));
      const latencyVals = ordered.map(r => r.latency_ms ?? 0);

      const fmtTs = ts => new Date(ts).toLocaleString([], {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });

      const fmtSync = d => d
        ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })
        : null;

      return (
        <>
          {/* ── Header ── */}
          <header className="header">
            <div className="header-brand">
              <span className="brand-name">ML<span className="brand-slash"> / </span>Pipeline</span>
              <span className="brand-sub">Inference Dashboard</span>
            </div>
            <div className="header-right">
              {error
                ? <span style={{ fontSize: '0.65rem', color: 'var(--red)' }}>{error}</span>
                : <div className="live-pill"><div className="live-dot" />Live</div>
              }
              {lastSync && (
                <span className="sync-time">synced {fmtSync(lastSync)}</span>
              )}
            </div>
          </header>

          {/* ── Main ── */}
          <div className="main">

            {/* Stats */}
            <div className="section-label">Overview</div>
            <div className="stats-grid">
              <StatCard idx={1} value={loading ? '…' : n}        label="Total inferences"    colorClass="c-mint"  delay="delay-1" />
              <StatCard idx={2} value={loading ? '…' : avgLatency} unit="ms" label="Avg latency" colorClass="c-amber" delay="delay-2" />
              <StatCard idx={3} value={loading ? '…' : avgTemp}   unit="°C" label="Avg apparent temp"                delay="delay-3" />
              <StatCard idx={4} value={loading ? '…' : modelVer}  label="Model version"                             delay="delay-4" />
            </div>

            {/* Charts */}
            <div className="section-label">Telemetry</div>
            <div className="charts-row">
              <div className="chart-card fade-up delay-1">
                <div className="chart-head">
                  <div>
                    <div className="chart-title">Predicted Temperature</div>
                    <div className="chart-desc">Avg apparent temp per file (°C)</div>
                  </div>
                  <div className="chart-badge">GBR · v{modelVer}</div>
                </div>
                <div className="chart-wrap">
                  {n > 0
                    ? <BarChart labels={chartLabels} values={tempVals} />
                    : <div className="empty"><span className="empty-icon">◫</span><span className="empty-text">No data yet</span></div>
                  }
                </div>
              </div>

              <div className="chart-card fade-up delay-2">
                <div className="chart-head">
                  <div>
                    <div className="chart-title">Inference Latency</div>
                    <div className="chart-desc">End-to-end ML API call time (ms)</div>
                  </div>
                  <div className="chart-badge">p95 target · 2 000 ms</div>
                </div>
                <div className="chart-wrap">
                  {n > 0
                    ? <LineChart labels={chartLabels} values={latencyVals} />
                    : <div className="empty"><span className="empty-icon">◫</span><span className="empty-text">No data yet</span></div>
                  }
                </div>
              </div>
            </div>

            {/* Table */}
            <div className="section-label">Recent inferences</div>
            <div className="table-card fade-up delay-3">
              <div className="table-head-row">
                <div>
                  <div className="table-head-title">Last 20 records</div>
                  <div className="table-head-meta" style={{ marginTop: '0.25rem' }}>
                    Refreshes automatically every 30 s
                  </div>
                </div>
                <button
                  className={`refresh-btn${fetching ? ' spinning' : ''}`}
                  onClick={load}
                  disabled={fetching}
                >
                  <SpinIcon /> Refresh
                </button>
              </div>

              {loading ? (
                <div className="empty">
                  <span className="empty-icon">◌</span>
                  <span className="empty-text">Loading…</span>
                </div>
              ) : n === 0 ? (
                <div className="empty">
                  <span className="empty-icon">◫</span>
                  <span className="empty-text">No inferences yet — upload a CSV to the input/ container</span>
                </div>
              ) : (
                <div style={{ overflowX: 'auto' }}>
                  <table>
                    <thead>
                      <tr>
                        <th>#</th>
                        <th>File</th>
                        <th>Timestamp</th>
                        <th>Records</th>
                        <th>Avg Apparent Temp</th>
                        <th>Latency</th>
                        <th>Model</th>
                      </tr>
                    </thead>
                    <tbody>
                      {rows.map((r, i) => (
                        <tr key={r.id || i} style={{ animationDelay: `${i * 0.025}s` }}>
                          <td className="t-dim">{String(i + 1).padStart(2, '0')}</td>
                          <td className="t-bright">
                            <span className="blob-name" title={r.blob_name}>{r.blob_name}</span>
                          </td>
                          <td className="t-dim">{fmtTs(r.timestamp)}</td>
                          <td>
                            <span className="chip chip-amber">{r.record_count ?? '—'}</span>
                          </td>
                          <td className="t-mint">
                            {r.confidence_score != null ? r.confidence_score.toFixed(2) + ' °C' : '—'}
                          </td>
                          <td className={r.latency_ms > 2000 ? 't-amber' : ''}>
                            {r.latency_ms != null ? r.latency_ms.toFixed(0) + ' ms' : '—'}
                          </td>
                          <td>
                            <span className="chip chip-mint">{r.model_version || '—'}</span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>

          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
